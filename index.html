<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YELELE – CRM Label</title>

<!-- Firebase CDN (version compatible avec HTML simple) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C96A;
  --gold-dim: rgba(201,168,76,0.15);
  --bg: #080810;
  --bg2: #0e0e1a;
  --bg3: #13131f;
  --glass: rgba(255,255,255,0.04);
  --border: rgba(201,168,76,0.18);
  --text: #f0eee8;
  --muted: #7a7a8e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
h1,h2,h3,.brand { font-family: 'Syne', sans-serif; }

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 20% 0%, rgba(201,168,76,0.07) 0%, transparent 60%),
              radial-gradient(ellipse 60% 50% at 80% 100%, rgba(138,90,200,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.glass-dark { background: rgba(8,8,16,0.6); border: 1px solid var(--border); backdrop-filter: blur(24px); }
.login-card { width: 100%; max-width: 420px; border-radius: 32px; padding: 48px 40px; }
.logo-icon { width: 80px; height: 80px; border-radius: 24px; background: linear-gradient(135deg, #C9A84C 0%, #8a5ac8 100%); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; box-shadow: 0 8px 32px rgba(201,168,76,0.4); }
.brand-title { font-size: 48px; font-weight: 800; text-align: center; letter-spacing: -2px; background: linear-gradient(135deg, var(--gold), #fff 50%, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.inp { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px 20px; font-size: 15px; color: var(--text); margin-bottom: 16px; }
.btn-gold { width: 100%; background: linear-gradient(135deg, #C9A84C, #8a5ac8); border: none; border-radius: 16px; padding: 16px; font-size: 16px; font-weight: 600; color: white; cursor: pointer; }

.collab-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 24px; padding: 28px; text-align: center; margin-bottom: 16px; }
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--bg2); border: 1px solid #34c759; border-radius: 16px; padding: 16px 24px; color: #34c759; z-index: 9999; }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card glass-dark">
    <div class="logo-icon">🎵</div>
    <div class="brand-title">YELELE</div>
    <div class="brand-sub">Label • CRM</div>
    <input id="login-id" class="inp" type="text" placeholder="Identifiant">
    <input id="login-password" class="inp" type="password" placeholder="Mot de passe">
    <button class="btn-gold" onclick="handleLogin()">Connexion 🚀</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" class="hidden" style="padding:20px;">
  <h1 style="color:var(--gold); margin-bottom:20px;">👥 Équipe</h1>
  <button onclick="openAddMemberModal()" class="btn-gold" style="margin-bottom:20px;">+ Nouveau membre</button>
  <div id="team-list"></div>
</div>

<!-- Modal Nouveau membre -->
<div id="modal-add-member" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;">
  <div style="background:var(--bg2);padding:30px;border-radius:20px;width:90%;max-width:400px;">
    <h2 style="margin-bottom:20px;">Nouveau membre</h2>
    <input id="member-name" class="inp" placeholder="Nom complet" style="margin-bottom:15px;">
    <select id="member-role" class="inp" style="margin-bottom:20px;">
      <option value="Artiste">Artiste</option>
      <option value="Marketing">Marketing</option>
      <option value="Production">Production</option>
      <option value="BeatMaker">BeatMaker</option>
    </select>
    <div style="display:flex;gap:10px;">
      <button onclick="closeAddMemberModal()" class="btn-gold" style="background:#555;flex:1;">Annuler</button>
      <button onclick="createMember()" class="btn-gold" style="flex:1;">Créer le membre</button>
    </div>
  </div>
</div>

<script>
// ==================== FIREBASE CONFIG (ton code) ====================
const firebaseConfig = {
  apiKey: "AIzaSyDPxX9KrrnMoU0gXZA8gRli4Pv6BYlpnBo",
  authDomain: "yelele-6a16b.firebaseapp.com",
  projectId: "yelele-6a16b",
  storageBucket: "yelele-6a16b.firebasestorage.app",
  messagingSenderId: "750159237197",
  appId: "1:750159237197:web:05a2bf45e16b2bb643cc04",
  measurementId: "G-SKGYB2MWGR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==================== VARIABLES ====================
let currentUser = null;
let isAdmin = false;

// ==================== LOGIN ====================
async function handleLogin() {
  const id = document.getElementById('login-id').value.trim().toUpperCase();
  const pw = document.getElementById('login-password').value.trim();

  if (id === 'ADMIN' && pw === '0713') {
    currentUser = { id: 'ADMIN', name: 'Elior', role: 'CEO' };
    isAdmin = true;
    startApp();
    return;
  }

  try {
    const doc = await db.collection('users').doc(id).get();
    if (doc.exists && doc.data().password === pw) {
      currentUser = doc.data();
      isAdmin = false;
      startApp();
    } else {
      alert("Identifiants incorrects");
    }
  } catch (e) {
    alert("Erreur de connexion");
  }
}

// ==================== CRÉER MEMBRE ====================
async function createMember() {
  if (!isAdmin) return alert("Seul l'admin peut créer des membres");

  const name = document.getElementById('member-name').value.trim();
  const role = document.getElementById('member-role').value;

  if (!name) return alert("Le nom est obligatoire");

  const userId = "USR-" + Math.random().toString(36).substring(2,8).toUpperCase();
  const password = Math.random().toString(36).substring(2,10);

  try {
    await db.collection('users').doc(userId).set({
      id: userId,
      name: name,
      role: role,
      password: password,
      createdAt: new Date()
    });

    alert(`Membre créé !\nID: ${userId}\nMot de passe: ${password}`);
    closeAddMemberModal();
    loadTeam();
  } catch (e) {
    alert("Erreur lors de la création");
  }
}

// ==================== CHARGER L'ÉQUIPE ====================
async function loadTeam() {
  const list = document.getElementById('team-list');
  list.innerHTML = "";

  const snapshot = await db.collection('users').get();
  snapshot.forEach(doc => {
    const user = doc.data();
    const div = document.createElement('div');
    div.className = "collab-card";
    div.innerHTML = `
      <strong>${user.name}</strong><br>
      ID: ${user.id}<br>
      Rôle: ${user.role}
    `;
    list.appendChild(div);
  });
}

// ==================== FONCTIONS MODAL ====================
function openAddMemberModal() {
  document.getElementById('modal-add-member').classList.remove('hidden');
}

function closeAddMemberModal() {
  document.getElementById('modal-add-member').classList.add('hidden');
  document.getElementById('member-name').value = '';
}

// ==================== DÉMARRAGE ====================
function startApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  loadTeam();
}

function logout() {
  location.reload();
}

// Lancement
window.onload = () => {
  console.log("YELELE CRM - Firebase chargé");
};
</script>
</body>
</html>
