<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YELELE – CRM Label</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C96A;
  --gold-dim: rgba(201,168,76,0.15);
  --bg: #080810;
  --bg2: #0e0e1a;
  --bg3: #13131f;
  --glass: rgba(255,255,255,0.04);
  --border: rgba(201,168,76,0.18);
  --text: #f0eee8;
  --muted: #7a7a8e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
h1,h2,h3,.brand { font-family: 'Syne', sans-serif; }

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 20% 0%, rgba(201,168,76,0.07) 0%, transparent 60%),
              radial-gradient(ellipse 60% 50% at 80% 100%, rgba(138,90,200,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.glass { background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(24px); }
.glass-dark { background: rgba(8,8,16,0.6); border: 1px solid var(--border); backdrop-filter: blur(24px); }

.login-card { width: 100%; max-width: 420px; border-radius: 32px; padding: 48px 40px; position: relative; overflow: hidden; }
.logo-icon { width: 80px; height: 80px; border-radius: 24px; background: linear-gradient(135deg, #C9A84C 0%, #8a5ac8 100%); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; box-shadow: 0 8px 32px rgba(201,168,76,0.4); }
.brand-title { font-size: 48px; font-weight: 800; text-align: center; letter-spacing: -2px; background: linear-gradient(135deg, var(--gold), #fff 50%, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.btn-gold { width: 100%; background: linear-gradient(135deg, #C9A84C, #8a5ac8); border: none; border-radius: 16px; padding: 16px; font-size: 16px; font-weight: 600; color: white; cursor: pointer; }
.inp { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px 20px; font-size: 15px; color: var(--text); margin-bottom: 16px; }

.topbar { background: rgba(8,8,16,0.8); border-bottom: 1px solid var(--border); padding: 0 28px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
.collab-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 24px; padding: 28px; text-align: center; }
.btn-primary { background: linear-gradient(135deg, #C9A84C, #8a5ac8); border: none; border-radius: 14px; padding: 12px 24px; color: white; cursor: pointer; }
.btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 14px; padding: 11px 20px; color: var(--text); cursor: pointer; }

.toast { position: fixed; bottom: 28px; right: 28px; background: var(--bg2); border: 1px solid rgba(52,199,89,0.4); border-radius: 16px; padding: 16px 24px; color: #34c759; z-index: 99999; }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card glass-dark">
    <div class="logo-icon">🎵</div>
    <div class="brand-title">YELELE</div>
    <div class="brand-sub">Label • CRM</div>
    <input id="login-id" class="inp" type="text" placeholder="Identifiant (ex: ADMIN)">
    <input id="login-password" class="inp" type="password" placeholder="Mot de passe">
    <button class="btn-gold" onclick="handleLogin()">Connexion 🚀</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" class="hidden">
  <div class="topbar">
    <div class="topbar-brand">YELELE</div>
    <div>
      <span id="user-role-badge" class="badge-role"></span>
      <button onclick="logout()" class="btn-secondary">Déconnexion</button>
    </div>
  </div>

  <div style="padding: 40px;">
    <h1 style="font-size: 32px; margin-bottom: 20px;">👥 Équipe</h1>
    <button class="btn-primary" onclick="openModal('add-collab')" style="margin-bottom: 20px;">+ Nouveau membre</button>
    <div id="collab-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;"></div>
  </div>
</div>

<!-- MODALS -->
<div id="modal-add-collab" class="modal-overlay hidden">
  <div class="modal-box">
    <h2>Nouveau membre</h2>
    <input id="nc-name" class="inp" placeholder="Nom complet">
    <select id="nc-role" class="inp">
      <option value="Artiste">Artiste</option>
      <option value="Marketing">Marketing</option>
      <option value="Production">Production</option>
      <option value="BeatMaker">BeatMaker</option>
    </select>
    <button onclick="createCollab()" class="btn-primary">Créer</button>
    <button onclick="closeModal('add-collab')" class="btn-secondary">Annuler</button>
  </div>
</div>

<div id="modal-cred" class="modal-overlay hidden">
  <div class="modal-box">
    <h2>Identifiants créés</h2>
    <p>ID : <strong id="cred-id"></strong></p>
    <p>Mot de passe : <strong id="cred-pw"></strong></p>
    <button onclick="closeModal('cred')" class="btn-primary">OK</button>
  </div>
</div>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
  apiKey: "AIzaSyDPxX9KrrnMoU0gXZA8gRli4Pv6BYlpnBo",
  authDomain: "yelele-6a16b.firebaseapp.com",
  projectId: "yelele-6a16b",
  storageBucket: "yelele-6a16b.firebasestorage.app",
  messagingSenderId: "750159237197",
  appId: "1:750159237197:web:05a2bf45e16b2bb643cc04",
  measurementId: "G-SKGYB2MWGR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==================== VARIABLES ====================
let currentUser = null;
let isAdmin = false;

// ==================== LOGIN ====================
async function handleLogin() {
  const id = document.getElementById('login-id').value.trim().toUpperCase();
  const pw = document.getElementById('login-password').value.trim();

  if (id === 'ADMIN' && pw === '0713') {
    currentUser = { id: 'ADMIN', name: 'Elior', role: 'CEO' };
    isAdmin = true;
    startApp();
    return;
  }

  try {
    const doc = await db.collection('users').doc(id).get();
    if (doc.exists && doc.data().password === pw) {
      currentUser = doc.data();
      isAdmin = false;
      startApp();
    } else {
      alert("Identifiants incorrects");
    }
  } catch (e) {
    alert("Erreur de connexion");
  }
}

// ==================== CRÉER MEMBRE ====================
async function createCollab() {
  if (!isAdmin) return alert("Accès refusé");

  const name = document.getElementById('nc-name').value.trim();
  const role = document.getElementById('nc-role').value;

  if (!name) return alert("Le nom est obligatoire");

  const userId = "USR-" + Math.random().toString(36).substring(2,8).toUpperCase();
  const password = Math.random().toString(36).substring(2,10);

  try {
    await db.collection('users').doc(userId).set({
      id: userId,
      name: name,
      role: role,
      password: password,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById('cred-id').textContent = userId;
    document.getElementById('cred-pw').textContent = password;
    closeModal('add-collab');
    openModal('cred');

    alert(`Membre ${name} créé avec succès !`);
    renderTeam();
  } catch (e) {
    alert("Erreur lors de la création");
  }
}

// ==================== AFFICHAGE ÉQUIPE ====================
async function renderTeam() {
  const grid = document.getElementById('collab-grid');
  grid.innerHTML = "";

  const snapshot = await db.collection('users').get();
  snapshot.forEach(doc => {
    const u = doc.data();
    const div = document.createElement('div');
    div.className = "collab-card";
    div.innerHTML = `
      <h3>${u.name}</h3>
      <p>ID: ${u.id}</p>
      <p>Rôle: ${u.role}</p>
      <button onclick="deleteMember('${u.id}')" style="color:red;">Supprimer</button>
    `;
    grid.appendChild(div);
  });
}

async function deleteMember(id) {
  if (confirm("Supprimer ce membre ?")) {
    await db.collection('users').doc(id).delete();
    renderTeam();
  }
}

// ==================== FONCTIONS UTILITAIRES ====================
function startApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  renderTeam();
}

function openModal(name) {
  document.getElementById(`modal-${name}`).classList.remove('hidden');
}

function closeModal(name) {
  document.getElementById(`modal-${name}`).classList.add('hidden');
}

function logout() {
  location.reload();
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// Lancement
window.onload = () => {
  console.log("YELELE CRM avec Firebase chargé");
};
</script>
</body>
</html>
